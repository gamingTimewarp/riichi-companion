name: Android Emulator Smoke

on:
  pull_request:
  workflow_dispatch:

jobs:
  android-emulator-smoke:
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: dtolnay/rust-toolchain@stable
      - run: npm ci
      - run: npx tauri android init
      - uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_6
          script: |
            npm run tauri:android
            test -f src-tauri/gen/android/app/build/outputs/apk/universal/release/app-universal-release-unsigned.apk

      - name: Upload Android smoke diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: android-smoke-diagnostics
          path: |
            src-tauri/gen/android/**/build/reports/**/*
            src-tauri/gen/android/**/build/outputs/**/*.log
            src-tauri/gen/android/**/build/outputs/**/*.txt
          if-no-files-found: ignore
