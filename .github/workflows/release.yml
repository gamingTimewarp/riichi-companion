name: Release

on:
  workflow_dispatch:
  push:
    tags: ['v*']
  pull_request:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  preflight:
    runs-on: ubuntu-22.04
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - name: Validate tag/version consistency
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAURI_VERSION=$(node -p "require('./src-tauri/tauri.conf.json').version")
          echo "Tag: $TAG"
          echo "package.json: $PKG_VERSION"
          echo "tauri.conf.json: $TAURI_VERSION"
          test "$TAG" = "$PKG_VERSION"
          test "$TAG" = "$TAURI_VERSION"

  build-linux:
    runs-on: ubuntu-22.04
    needs: [preflight]
    if: always() && (needs.preflight.result == 'success' || github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: sudo apt-get install -y libwebkit2gtk-4.1-dev libssl-dev libappindicator3-dev librsvg2-dev patchelf xvfb
      - uses: dtolnay/rust-toolchain@stable
      - run: npm ci
      - run: npm run tauri build -- --bundles appimage,deb,rpm
        env:
          APPIMAGE_EXTRACT_AND_RUN: 1
      - name: Smoke-test AppImage launch
        run: |
          APPIMAGE=$(find src-tauri/target/release/bundle/appimage -name '*.AppImage' | head -n1)
          if [ -z "$APPIMAGE" ]; then
            echo 'No AppImage found for smoke test.'
            exit 1
          fi

          export APPIMAGE_EXTRACT_AND_RUN=1
          export WEBKIT_DISABLE_COMPOSITING_MODE=1
          export WEBKIT_DISABLE_DMABUF_RENDERER=1
          export LIBGL_ALWAYS_SOFTWARE=1
          export GDK_BACKEND=x11

          set +e
          timeout 30s xvfb-run -a "$APPIMAGE" > /tmp/appimage-smoke.log 2>&1
          CODE=$?
          set -e

          if [ "$CODE" -ne 0 ] && [ "$CODE" -ne 124 ]; then
            echo "AppImage smoke test failed with exit code $CODE"
            cat /tmp/appimage-smoke.log

            {
              echo ''
              echo '--- coredumpctl latest WebKitWebProcess ---'
              coredumpctl info --no-pager --json=short 2>/dev/null | head -n 200 || true
              echo ''
              echo '--- journalctl (recent tail) ---'
              journalctl -n 200 --no-pager 2>/dev/null || true
            } > /tmp/appimage-crash-context.log

            exit "$CODE"
          fi
          echo "AppImage smoke test passed with exit code $CODE"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: linux-smoke-logs
          path: |
            /tmp/appimage-smoke.log
            /tmp/appimage-crash-context.log
      - uses: actions/upload-artifact@v4
        with:
          name: linux-bundles
          path: |
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/rpm/*.rpm

  build-windows:
    runs-on: windows-latest
    needs: [preflight]
    if: always() && (needs.preflight.result == 'success' || github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: dtolnay/rust-toolchain@stable
      - run: npm ci
      - run: npm run tauri build -- --bundles nsis,msi
      - uses: actions/upload-artifact@v4
        with:
          name: windows-bundles
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi

  build-android:
    runs-on: ubuntu-22.04
    needs: [preflight]
    if: always() && (needs.preflight.result == 'success' || github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - name: Install NDK
        run: echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "ndk;29.0.14206865"
      - uses: dtolnay/rust-toolchain@stable
      - run: rustup target add aarch64-linux-android armv7-linux-androideabi i686-linux-android x86_64-linux-android
      - run: npm ci
      - run: npx tauri android init
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/29.0.14206865
      - run: npm run tauri:android
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/29.0.14206865
      - name: Sign APK
        if: github.event_name != 'pull_request'
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE }}" | base64 -d > /tmp/release.keystore
          BUILD_TOOLS=$ANDROID_HOME/build-tools/$(ls $ANDROID_HOME/build-tools | sort -V | tail -1)
          $BUILD_TOOLS/apksigner sign \
            --ks /tmp/release.keystore \
            --ks-key-alias "${{ secrets.ANDROID_KEY_ALIAS }}" \
            --ks-pass pass:"${{ secrets.ANDROID_STORE_PASSWORD }}" \
            --key-pass pass:"${{ secrets.ANDROID_KEY_PASSWORD }}" \
            --out src-tauri/gen/android/app/build/outputs/apk/universal/release/riichi-companion.apk \
            src-tauri/gen/android/app/build/outputs/apk/universal/release/app-universal-release-unsigned.apk
      - uses: actions/upload-artifact@v4
        with:
          name: android-bundles
          path: |
            src-tauri/gen/android/app/build/outputs/apk/universal/release/riichi-companion.apk
            src-tauri/gen/android/app/build/outputs/apk/universal/release/app-universal-release-unsigned.apk

  build-android-aab:
    runs-on: ubuntu-22.04
    needs: [preflight]
    if: always() && (needs.preflight.result == 'success' || github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - name: Install NDK
        run: echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "ndk;29.0.14206865"
      - uses: dtolnay/rust-toolchain@stable
      - run: rustup target add aarch64-linux-android armv7-linux-androideabi i686-linux-android x86_64-linux-android
      - run: npm ci
      - run: npx tauri android init
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/29.0.14206865
      - name: Build AAB
        run: npm run tauri:android:aab
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/29.0.14206865
      - name: Sign AAB
        if: github.event_name != 'pull_request'
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE }}" | base64 -d > /tmp/release.keystore
          AAB=$(find src-tauri/gen/android/app/build/outputs/bundle -name '*.aab' | head -n1)
          jarsigner \
            -verbose \
            -sigalg SHA256withRSA \
            -digestalg SHA-256 \
            -keystore /tmp/release.keystore \
            -storepass "${{ secrets.ANDROID_STORE_PASSWORD }}" \
            -keypass "${{ secrets.ANDROID_KEY_PASSWORD }}" \
            "$AAB" \
            "${{ secrets.ANDROID_KEY_ALIAS }}"
          cp "$AAB" src-tauri/gen/android/app/build/outputs/bundle/riichi-companion.aab
      - uses: actions/upload-artifact@v4
        with:
          name: android-aab
          path: src-tauri/gen/android/app/build/outputs/bundle/riichi-companion.aab
          if-no-files-found: ignore

  publish-release:
    needs: [build-linux, build-windows, build-android, build-android-aab]
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-22.04
    environment: release
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: linux-bundles
          path: artifacts/linux
      - uses: actions/download-artifact@v4
        with:
          name: windows-bundles
          path: artifacts/windows
      - uses: actions/download-artifact@v4
        with:
          name: android-bundles
          path: artifacts/android
      - uses: actions/download-artifact@v4
        with:
          name: android-aab
          path: artifacts/android
          # AAB is only produced on non-PR runs; tolerate absence on PRs
        continue-on-error: true
      - name: Generate checksums
        run: |
          find artifacts -type f -print0 | xargs -0 sha256sum > artifacts/SHA256SUMS.txt
      - name: Verify APK and capture certs
        run: |
          BUILD_TOOLS=$ANDROID_HOME/build-tools/$(ls $ANDROID_HOME/build-tools | sort -V | tail -1)
          APK=$(find artifacts/android -name 'riichi-companion.apk' | head -n1 || true)
          if [ -n "$APK" ]; then
            $BUILD_TOOLS/apksigner verify --print-certs "$APK" | tee artifacts/android/APK_SIGNATURE.txt
          else
            echo 'Signed APK not found; verification skipped.' > artifacts/android/APK_SIGNATURE.txt
          fi
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/linux/**/*
            artifacts/windows/**/*
            artifacts/android/**/*
            artifacts/SHA256SUMS.txt
          generate_release_notes: true
